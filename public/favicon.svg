<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="line" x1="8" y1="0" x2="56" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="60%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="white" stroke-width="0.5" opacity="0.07">
    <line x1="10" y1="44" x2="54" y2="44"/>
    <line x1="10" y1="36" x2="54" y2="36"/>
    <line x1="10" y1="28" x2="54" y2="28"/>
    <line x1="10" y1="20" x2="54" y2="20"/>
  </g>

  <!-- Chart line: rises then droops (undertrained!) -->
  <polyline
    points="10,42 18,36 26,24 32,18 38,22 44,32 50,40 54,46"
    fill="none"
    stroke="url(#line)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Peak dot (the moment before the droop) -->
  <circle cx="32" cy="18" r="3.5" fill="#818CF8"/>
  <circle cx="32" cy="18" r="1.5" fill="white" opacity="0.5"/>

  <!-- Droopy end dot -->
  <circle cx="54" cy="46" r="2.5" fill="#F472B6" opacity="0.7"/>
</svg>

name: Testing
on: [push]
jobs:
  e2e:
    name: "Build + E2E tests"
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: undertrained
          POSTGRES_USER: undertrained
          POSTGRES_PASSWORD: undertrained
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U undertrained"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      NEXTAUTH_SECRET: supersecret
      DATABASE_URL: postgresql://undertrained:undertrained@localhost:5432/undertrained
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 8.5.1

      - uses: actions/setup-node@v3
        with:
          node-version: 22.x
          cache: "pnpm" # You can active this cache when your repo has a lockfile

      - name: Install deps (with cache)
        run: pnpm install

      - name: Install playwright
        run: pnpm playwright install chromium

      - name: Next.js cache
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-nextjs

      - name: Push DB schema
        run: pnpm db:push

      - run: pnpm build
      - run: pnpm test-e2e

      - name: Check types
        run: pnpm tsc

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v2
        with:
          name: test results
          path: |
            playwright/test-results

  unit:
    name: "Unit tests + typecheck"
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: undertrained
          POSTGRES_USER: undertrained
          POSTGRES_PASSWORD: undertrained
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U undertrained"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      NEXTAUTH_SECRET: supersecret
      DATABASE_URL: postgresql://undertrained:undertrained@localhost:5432/undertrained
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 8.5.1

      - uses: actions/setup-node@v3
        with:
          node-version: 22.x
          cache: "pnpm" # You can active this cache when your repo has a lockfile

      - name: Install deps (with cache)
        run: pnpm install

      - name: Next.js cache
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-nextjs

      - run: pnpm test-unit
      - run: pnpm tsc
